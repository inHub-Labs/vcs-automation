name: Terraform Governance

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    env:
      TF_VAR_github_organization: ${{ github.repository_owner }}
      GITHUB_APP_ID: ${{ secrets.TF_GITHUB_APP_ID }}
      GITHUB_APP_INSTALLATION_ID: ${{ secrets.TF_GITHUB_APP_INSTALLATION_ID }}
      GITHUB_APP_PEM_FILE: ${{ secrets.TF_GITHUB_APP_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::762233769464:role/github-actions-terraform
          aws-region: eu-north-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Create artifacts dir
        run: mkdir -p artifacts

      - name: Terraform Plan
        run: |
          set -o pipefail
          terraform plan -input=false -lock-timeout=15s -no-color -out=tfplan 2>&1 | tee artifacts/01_plan_initial.txt

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          set -o pipefail
          terraform apply -input=false -lock-timeout=10m -no-color tfplan 2>&1 | tee artifacts/02_apply.txt

      - name: Collect metrics
        if: github.ref == 'refs/heads/main'
        run: |
          {
            echo "=== Terraform state resources ==="
            terraform state list 2>/dev/null | tee artifacts/state_list.txt | wc -l | xargs echo "Total resources:"
            echo ""
            echo "=== Lines of code ==="
            find . -name "*.tf" | xargs wc -l | tail -1
            echo ""
            echo "=== repositories.yaml lines ==="
            wc -l repositories.yaml
            echo ""
            echo "=== tfvars lines ==="
            wc -l *.auto.tfvars
            echo ""
            echo "=== Repos in repositories.yaml ==="
            grep "^- name:" repositories.yaml | wc -l | xargs echo "Repos:"
            echo ""
            echo "=== Teams ==="
            grep -c "name\s*=" teams.auto.tfvars | xargs echo "Teams:"
            echo ""
            echo "=== Org members ==="
            grep -c "username" organization_members.auto.tfvars | xargs echo "Members:"
          } | tee artifacts/03_metrics.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
